<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원가입 - MealVote</title>
  
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; max-width: 420px; margin: 40px auto; }
    input, button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { cursor: pointer; border: none; font-weight: bold; }
    .msg { margin-top: 10px; font-size: 14px; }
    a { text-decoration: none; }

    button[type="submit"] {
      background-color: #007bff;
      color: white;
    }
    button[type="submit"]:hover {
      background-color: #0056b3;
    }
    
    .links { 
      margin-top: 20px; 
    }
    .nav-button {
      width: 100%;
      background-color: #6c757d;
      color: white;
    }
    .nav-button:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <h2>🍱 MealVote 회원가입</h2>

  <!-- 아이디/비밀번호를 입력받는 회원가입 폼 -->
  <form id="signup-form">
    <input id="u" placeholder="아이디" required />
    <input id="p" type="password" placeholder="비밀번호(4자 이상)" minlength="4" required />
    <button type="submit">가입하기</button>
  </form>

  <!-- 서버 응답 메시지 출력 영역 -->
  <div class="msg" id="msg"></div>
  
  <div class="links">
    <button id="goto-main" class="nav-button">메인으로</button>
  </div>

  <script>
    const API_AUTH = '/api/auth/';
    
    // 회원가입 폼 제출 시, 서버의 /api/auth/register 로 AJAX 요청
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('u').value.trim();
      const password = document.getElementById('p').value;
      const msg = document.getElementById('msg');
      msg.textContent = '처리 중...';

      try {
        const r = await fetch(API_AUTH + 'register', {
          method: 'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });

        // 201 이면 회원가입 성공
        if (r.status === 201) {
          msg.textContent = '회원가입 성공! 이제 로그인 해주세요.';
          setTimeout(() => location.href = '/login.html', 1500);
        } else {
          // 실패 시 서버에서 보낸 메시지를 표시
          const data = await r.json().catch(() => ({}));
          msg.textContent = '실패: ' + (data.message || data.error || r.status);
        }
      } catch (err) {
        // 네트워크 오류 등 예외 처리
        msg.textContent = '네트워크 오류';
      }
    });

    // 메인 화면으로 이동 버튼
    document.getElementById('goto-main').onclick = () => {
      location.href = '/';
    };
  </script>
</body>
</html>
