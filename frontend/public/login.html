<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - MealVote</title>
  
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; max-width: 420px; margin: 40px auto; }
    input, button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { cursor: pointer; border: none; font-weight: bold; }
    .msg { margin-top: 10px; font-size: 14px; }
    a { text-decoration: none; }
    
    button[type="submit"] {
      background-color: #007bff;
      color: white;
    }
    button[type="submit"]:hover {
      background-color: #0056b3;
    }
    
    .links { 
      margin-top: 20px; 
      display: flex; 
      justify-content: space-between; 
    }
    .nav-button {
      width: 49%; 
      background-color: #6c757d;
      color: white;
    }
    .nav-button:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <h2>🍱 MealVote 로그인</h2>
  
  <!-- 아이디/비밀번호를 입력받는 로그인 폼 -->
  <form id="login-form">
    <input id="u" placeholder="아이디" required />
    <input id="p" type="password" placeholder="비밀번호" required />
    <button type="submit">로그인</button>
  </form>
  
  <!-- 로그인 결과 메시지 영역 -->
  <div class="msg" id="msg"></div>
  
  <div class="links">
    <button id="goto-signup" class="nav-button">회원가입 하러가기</button>
    <button id="goto-main" class="nav-button">메인으로</button>
  </div>

  <script>
    const API_AUTH = '/api/auth/';
    
    // 로그인 폼 제출 시 /api/auth/login 으로 AJAX 요청
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('u').value.trim();
      const password = document.getElementById('p').value;
      const msg = document.getElementById('msg');
      msg.textContent = '로그인 시도 중...';

      try {
        const r = await fetch(API_AUTH + 'login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });
        
        // r.ok(200)이면 로그인 성공 → 메인으로 이동
        if (r.ok) {
          msg.textContent = '로그인 성공! 메인 페이지로 이동합니다.';
          setTimeout(() => location.href='/', 1000);
        } else {
          // 실패 시 서버 응답 메시지 또는 기본 안내 메시지 표시
          const data = await r.json().catch(() => ({}));
          msg.textContent = '실패: ' + (data.message || '아이디 또는 비밀번호가 틀립니다.');
        }
      } catch (err) {
        msg.textContent = '네트워크 오류';
      }
    });

    // 화면 이동 버튼들
    document.getElementById('goto-signup').onclick = () => {
      location.href = '/signup.html';
    };
    document.getElementById('goto-main').onclick = () => {
      location.href = '/';
    };
  </script>
</body>
</html>
